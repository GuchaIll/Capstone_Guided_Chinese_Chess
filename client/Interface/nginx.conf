server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so upstream names are resolved at request
    # time rather than at nginx startup (avoids "host not found" crashes).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy bridge-owned gameplay WebSocket
    location /bridge/ws {
        set $bridge_upstream http://state-bridge:5003;
        proxy_pass $bridge_upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Proxy REST API calls to Go coaching server
    location /api/ {
        set $coaching_upstream http://go-coaching:8080;
        proxy_pass $coaching_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy dashboard SSE + API to Go coaching server
    location ^~ /dashboard/ {
        set $coaching_upstream http://go-coaching:8080;
        proxy_pass $coaching_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # Proxy state-bridge REST calls for physical-board validation flows
    location /bridge/ {
        set $bridge_upstream state-bridge:5003;
        rewrite ^/bridge/?(.*)$ /$1 break;
        proxy_pass http://$bridge_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        # SSE support for /bridge/state/events
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }
}
