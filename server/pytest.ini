[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# Coverage scope is narrowed in .coveragerc (omits operator entrypoints,
# data tooling, and live-network adapters). The gate is the floor of
# what the unit tests currently exercise — see services/orchestrator.py
# (~26%) for the biggest un-tested path; raising the gate from 55% will
# require contract tests for that file and the agent → coach branch.
addopts = --cov=agent_orchestration --cov=app --cov-report=term-missing --cov-report=html:coverage_html --cov-fail-under=55
testpaths = agent_orchestration/tests
