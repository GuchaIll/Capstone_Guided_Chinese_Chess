# ============================================================
# Guided Chinese Chess - Docker Compose
# ============================================================
# Start everything:    docker compose up --build
# Start in background: docker compose up --build -d
# Stop:                docker compose down
# View logs:           docker compose logs -f
# Rebuild one service: docker compose build engine
# ============================================================

services:
  # ---- Rust Chess Engine ----
  # WebSocket game server: move validation, AI, legal moves
  engine:
    build:
      context: .
      dockerfile: Engine/Dockerfile
    container_name: chess-engine
    ports:
      - "8080:8080"
    volumes:
      - engine-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- Python Coaching Server ----
  # Agent orchestration, RAG, LLM, coaching WebSocket
  coaching:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chess-coaching
    ports:
      - "5001:5000"
    volumes:
      - coaching-logs:/app/logs
      - coaching-profiles:/app/agent_orchestration/.agent/profiles
      - chroma-data:/app/chroma_db
    environment:
      - ENGINE_WS_URL=ws://engine:8080/ws
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
      - RAG_BACKEND=${RAG_BACKEND:-chromadb}
      - CHROMA_DB_PATH=/app/chroma_db
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-m3}
      - LOG_LEVEL=INFO
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemma-3-12b-it:free}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---- React Frontend ----
  # Board UI, chat panel, served via nginx with WS proxy
  client:
    build:
      context: ./client/Interface
      dockerfile: Dockerfile
    container_name: chess-client
    ports:
      - "3000:3000"
      - "80:3000"
    depends_on:
      engine:
        condition: service_healthy
      go-coaching:
        condition: service_healthy
    restart: unless-stopped

  # ---- Kibo Agent Viewer ----
  # 3D character display controlled by the orchestration engine
  kibo:
    build:
      context: ./Kibo
      dockerfile: Dockerfile
    container_name: kibo-viewer
    ports:
      - "3001:3001"
    depends_on:
      coaching:
        condition: service_healthy
    restart: unless-stopped

  # ---- Go Coaching Service ----
  # Go Agent Framework: position analysis, blunder detection, puzzle generation
  go-coaching:
    build:
      context: ./server
      dockerfile: chess_coach/Dockerfile
    container_name: go-coaching
    ports:
      - "5002:8080"
    environment:
      - BRIDGE_URL=http://state-bridge:5003
      - CHROMADB_URL=http://chromadb:8000
      - EMBEDDING_URL=http://embedding:8100
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    depends_on:
      state-bridge:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      embedding:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- ChromaDB Vector Store ----
  # Persistent vector database for RAG retrieval (used by go-coaching)
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- Embedding Service ----
  # Sentence-transformer embedding API for Go coaching RAG queries
  embedding:
    build:
      context: ./server/embedding_service
      dockerfile: Dockerfile
    container_name: embedding-service
    ports:
      - "8100:8100"
    environment:
      - EMBEDDING_PORT=8100
    restart: unless-stopped
    volumes:
      - embedding-model-cache:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---- State Bridge ----
  # Event bus between engine, CV, LED, coaching, and client
  state-bridge:
    build:
      context: ./server/state_bridge
      dockerfile: Dockerfile
    container_name: state-bridge
    ports:
      - "5003:5003"
    environment:
      - ENGINE_WS_URL=ws://engine:8080/ws
      - BRIDGE_PORT=5003
    depends_on:
      engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5003/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  engine-logs:
  coaching-logs:
  coaching-profiles:
  chroma-data:
  embedding-model-cache:
