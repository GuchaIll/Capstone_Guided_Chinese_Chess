# ============================================================
# Guided Chinese Chess - Docker Compose
# ============================================================
# Start everything:    docker compose up --build
# Start in background: docker compose up --build -d
# Stop:                docker compose down
# View logs:           docker compose logs -f
# Rebuild one service: docker compose build engine
# ============================================================

services:
  # ---- Rust Chess Engine ----
  # WebSocket game server: move validation, AI, legal moves
  engine:
    build:
      context: .
      dockerfile: Engine/Dockerfile
    container_name: chess-engine
    ports:
      - "8080:8080"
    volumes:
      - engine-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- Python Coaching Server ----
  # Agent orchestration, RAG, LLM, coaching WebSocket
  coaching:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chess-coaching
    ports:
      - "5000:5000"
    volumes:
      - coaching-logs:/app/logs
      - coaching-profiles:/app/agent_orchestration/.agent/profiles
      - chroma-data:/app/chroma_db
    environment:
      - ENGINE_WS_URL=ws://engine:8080/ws
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
      - RAG_BACKEND=${RAG_BACKEND:-chromadb}
      - CHROMA_DB_PATH=/app/chroma_db
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-m3}
      - LOG_LEVEL=INFO
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemma-3-12b-it:free}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---- React Frontend ----
  # Board UI, chat panel, served via nginx with WS proxy
  client:
    build:
      context: ./client/Interface
      dockerfile: Dockerfile
    container_name: chess-client
    ports:
      - "3000:3000"
      - "80:3000"
    depends_on:
      engine:
        condition: service_healthy
      coaching:
        condition: service_healthy
    restart: unless-stopped

volumes:
  engine-logs:
  coaching-logs:
  coaching-profiles:
  chroma-data:
