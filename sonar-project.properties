sonar.projectKey=guchaill_capstone_guided_chinese_chess
sonar.organization=guchaill

sonar.projectName=Capstone Guided Chinese Chess
sonar.projectVersion=1.0

# Sources to analyse (Rust, Go, Python)
sonar.sources=Engine/src,server,cv
sonar.exclusions=**/target/**,**/node_modules/**,**/.venv/**,**/vendor/**,**/testdata/**

# Python settings
sonar.python.version=3.12
sonar.python.ruff.reportPaths=ruff-report.json

# Go: SonarCloud detects Go sources automatically; point at the module roots
# Rust: no native Sonar Rust analyser — clippy issues imported via external report
sonar.externalIssuesReportPaths=clippy-report.json

# Coverage (add paths here once you generate coverage reports)
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.go.coverage.reportPaths=coverage.out
